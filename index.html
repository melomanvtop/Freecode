<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Mini Shop</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      background-color: #000000;
      color: #ffffff;
      position: relative;
      min-height: 100vh;
    }
    .product-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: -10px;
    }
    .product {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      width: 90px;
      padding: 16px;
      border-radius: 12px;
      backdrop-filter: blur(16px);
      background-color: rgba(255, 255, 255, 0.08);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
      transition: background-color 0.3s, transform 0.2s;
    }
    .product:hover {
      box-shadow: 0 0 12px 4px #00ff99;
      background-color: rgba(255, 255, 255, 0.03);
      transform: translateY(-2px);
    }
    .product img {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 4px;
      padding: 1px;
      background-color: transparent;
    }
    .product span {
      margin-top: 6px;
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      color: #00ff99;
    }
    .toggle-theme {
      position: fixed;
      top: 16px;
      right: 16px;
      background-color: #00ff99;
      color: #000;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      z-index: 1000;
    }
    .banner {
      width: 100%;
      margin-bottom: 20px;
      border-radius: 12px;
      overflow: hidden;
    }
    .banner img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <button class="toggle-theme" onclick="toggleTheme()">Сменить тему</button>

  <div class="banner">
    <img src="https://files.oaiusercontent.com/file-NPGfk1xDFQyS3ATvjKyAZW?se=2025-06-18T22%3A34%3A42Z&sp=r&sv=2024-08-04&sr=b&rscc=max-age%3D299%2C%20immutable%2C%20private&rscd=attachment%3B%20filename%3D%25D0%25A2%25D0%25B5%25D0%25BA%25D1%2581%25D1%2582%2520%25D0%25B0%25D0%25B1%25D0%25B7%25D0%25B0%25D1%2586%25D0%25B0-3.png&sig=ErRu4kUKSKHN%2B0%2BL1eS%2B6o8iEYhSrCM0aLeCwz5XJ2Q%3D" alt="Banner" />
  </div>

  <div class="product-list">
    <div class="product" onclick="sendProduct('App Store')">
      <img src="https://upload.wikimedia.org/wikipedia/commons/5/5f/Apple_logo_black.svg" alt="App Store" />
      <span>App Store</span>
    </div>
    <div class="product" onclick="sendProduct('Fortnite')">
      <img src="https://upload.wikimedia.org/wikipedia/commons/0/09/Fortnite_F_letter_logo.svg" alt="Fortnite" />
      <span>Fortnite</span>
    </div>
    <div class="product" onclick="sendProduct('Netflix')">
      <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" alt="Netflix" />
      <span>Netflix</span>
    </div>
    <div class="product" onclick="sendProduct('Spotify')">
      <img src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg" alt="Spotify" />
      <span>Spotify</span>
    </div>
    <div class="product" onclick="sendProduct('Epic Games')">
      <img src="https://upload.wikimedia.org/wikipedia/commons/3/31/Epic_Games_logo.svg" alt="Epic Games" />
      <span>Epic Games</span>
    </div>
    <div class="product" onclick="sendProduct('Steam')">
      <img src="https://upload.wikimedia.org/wikipedia/commons/8/83/Steam_icon_logo.svg" alt="Steam" />
      <span>Steam</span>
    </div>
  </div>

  <script>
    function sendProduct(name) {
      Telegram.WebApp.sendData(name);
      Telegram.WebApp.close();
    }

    function toggleTheme() {
      const body = document.body;
      const currentBg = getComputedStyle(body).backgroundColor;
      if (currentBg === 'rgb(0, 0, 0)' || currentBg === '#000000') {
        body.style.backgroundColor = '#ffffff';
        body.style.color = '#000000';
      } else {
        body.style.backgroundColor = '#000000';
        body.style.color = '#ffffff';
      }
    }
  </script>
</body>
</html>
